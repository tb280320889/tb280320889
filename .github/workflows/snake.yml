name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: Platane/snk@v3
        with:
          github_user_name: tb280320889
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the generated files before branch switch
          mv dist /tmp/snake-dist

          # Create or checkout the output branch
          git fetch origin output 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
          fi

          # Restore generated files and clean working dir
          rm -rf *
          cp -r /tmp/snake-dist/* .

          git add -A
          git commit -m "Update snake animation" --allow-empty
          git push origin output
