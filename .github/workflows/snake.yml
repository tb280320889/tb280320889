name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: Platane/snk@v3
        with:
          github_user_name: tb280320889
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Deploy to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin output 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/output; then
            # Output branch exists — use worktree (avoids checkout conflicts)
            git worktree add -f ../output-worktree output
            rm -rf ../output-worktree/* 2>/dev/null || true
            cp -r dist/* ../output-worktree/
            cd ../output-worktree
            git add -A
            git commit -m "Update snake animation" --allow-empty
            git push origin output
            cd "$GITHUB_WORKSPACE"
            git worktree remove ../output-worktree --force
          else
            # First run — move dist out of the way, create orphan
            mv dist ../saved-dist
            git checkout --orphan output
            git rm -rf . 2>/dev/null || true
            mv ../saved-dist/* .
            git add -A
            git commit --allow-empty -m "Initial snake animation"
            git push origin output
            git checkout master
          fi
